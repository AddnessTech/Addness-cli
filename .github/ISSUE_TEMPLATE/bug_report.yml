name: Bug report
description: Report a reproducible problem in Addness CLI
title: "Bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Do not include API keys, tokens, private URLs, customer data, or screenshots with private information.
  - type: input
    id: version
    attributes:
      label: Addness CLI version
      placeholder: "addness --version"
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: "macOS 15, zsh"
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide exact commands and minimal input.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
