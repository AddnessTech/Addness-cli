name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  S3_BUCKET: ${{ vars.CLI_S3_BUCKET }}
  CDN_DISTRIBUTION_ID: ${{ vars.CLI_CDN_DISTRIBUTION_ID }}

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        run: |
          ARCHIVE_NAME="addness-${{ matrix.target }}.tar.gz"
          tar -czf "${ARCHIVE_NAME}" -C target/${{ matrix.target }}/release addness
          shasum -a 256 "${ARCHIVE_NAME}" > "${ARCHIVE_NAME}.sha256"
          echo "ARCHIVE_NAME=${ARCHIVE_NAME}" >> "$GITHUB_ENV"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: |
            addness-*.tar.gz
            addness-*.tar.gz.sha256

  upload:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-1

      - uses: actions/checkout@v4
        with:
          sparse-checkout: install.sh
          sparse-checkout-cone-mode: false

      - name: Upload to S3
        run: |
          VERSION="${GITHUB_REF_NAME}"
          # バージョン付きパスにアップロード
          aws s3 cp artifacts/ "s3://${S3_BUCKET}/releases/${VERSION}/" --recursive
          # latest にもコピー
          aws s3 cp artifacts/ "s3://${S3_BUCKET}/releases/latest/" --recursive

      - name: Upload install script
        run: |
          aws s3 cp install.sh "s3://${S3_BUCKET}/install.sh" \
            --content-type "text/plain"

      - name: Invalidate CDN cache
        if: env.CDN_DISTRIBUTION_ID != ''
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${CDN_DISTRIBUTION_ID}" \
            --paths "/releases/latest/*" "/install.sh"
