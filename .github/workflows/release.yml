name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write # Required for OIDC

env:
  CARGO_TERM_COLOR: always
  S3_BUCKET: ${{ vars.CLI_S3_BUCKET }}
  CDN_DISTRIBUTION_ID: ${{ vars.CLI_CDN_DISTRIBUTION_ID }}

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          ARCHIVE_NAME="addness-${{ matrix.target }}.tar.gz"
          tar -czf "${ARCHIVE_NAME}" -C target/${{ matrix.target }}/release addness
          shasum -a 256 "${ARCHIVE_NAME}" > "${ARCHIVE_NAME}.sha256"
          echo "ARCHIVE_NAME=${ARCHIVE_NAME}" >> "$GITHUB_ENV"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ARCHIVE_NAME = "addness-${{ matrix.target }}.zip"
          Compress-Archive -Path "target/${{ matrix.target }}/release/addness.exe" -DestinationPath $ARCHIVE_NAME
          $hash = (Get-FileHash -Algorithm SHA256 $ARCHIVE_NAME).Hash.ToLower()
          "$hash  $ARCHIVE_NAME" | Out-File -Encoding ascii "${ARCHIVE_NAME}.sha256"
          "ARCHIVE_NAME=$ARCHIVE_NAME" | Out-File -Append -Encoding ascii $env:GITHUB_ENV

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.target }}
          path: |
            addness-*.tar.gz
            addness-*.tar.gz.sha256
            addness-*.zip
            addness-*.zip.sha256

  upload:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: |
            install.sh
            install.ps1
          sparse-checkout-cone-mode: false

      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.CLI_RELEASE_ROLE_ARN }}
          aws-region: ap-northeast-1

      - name: Upload to S3
        run: |
          VERSION="${GITHUB_REF_NAME}"
          # バージョン付きパスにアップロード
          aws s3 cp artifacts/ "s3://${S3_BUCKET}/releases/${VERSION}/" --recursive
          # latest にもコピー
          aws s3 cp artifacts/ "s3://${S3_BUCKET}/releases/latest/" --recursive

      - name: Upload install scripts and version file
        run: |
          aws s3 cp install.sh "s3://${S3_BUCKET}/install.sh" \
            --content-type "text/plain"
          aws s3 cp install.ps1 "s3://${S3_BUCKET}/install.ps1" \
            --content-type "text/plain"
          echo "${GITHUB_REF_NAME}" | aws s3 cp - "s3://${S3_BUCKET}/releases/latest/version.txt" \
            --content-type "text/plain"

      - name: Invalidate CDN cache
        if: env.CDN_DISTRIBUTION_ID != ''
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${CDN_DISTRIBUTION_ID}" \
            --paths "/releases/latest/*" "/install.sh" "/install.ps1"
